<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>USERS</title>
    <link rel="stylesheet" href="css/site.css" />
</head>


<body>
    <header>
        <h1>Users Management</h1>
    </header>
    <main class="container">
        <section class="music-section">
            <div class="table-card">
                <div class="table-header">
                    <h2>Users</h2>
                    <p id="counter"></p>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Name</th>
                            <th>Password</th>
                            <th>Role</th>
                            <th>Email</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody id="usrs"></tbody>
                </table>
            </div>

            <div id="editForm" class="form-card" style="display:none;">
                <h2>Edit User</h2>
                <form action="javascript:void(0);" onsubmit="updateItem()">
                    <input type="hidden" id="edit-id">
                    <label for="edit-name">Name: </label>
                    <input type="text" id="edit-name" required>
                    <label for="edit-passwd">Password: </label>
                    <input type="text" id="edit-passwd" required>
                    <label for="edit-role">Role: </label>
                    <input type="text" id="edit-role" required>
                    <label for="edit2-email">Email: </label>
                    <input type="text" id="edit-email" placeholder="User Email" required>
                    <input type="submit" value="Save">
                    <a onclick="closeInput()" aria-label="Close" class="close-btn">&#10006;</a>
                </form>
            </div>
            <div class="admin-link-container">
                <a href="./index.html" class="admin-link-btn">Music Page</a>
            </div>
        </section>
        <aside class="sidebar">
            <div class="form-card">
                <h2>Add User</h2>
                <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
                    <label for="add-name">Name: </label>
                    <input type="text" id="add-name" placeholder="New User's Name" required>
                    <label for="add-passwd">Password: </label>
                    <input type="text" id="add-passwd" placeholder="New User's Password" required>
                    <label for="add-role">Role: </label>
                    <input type="text" id="add-role" placeholder="New User's Role" required>
                    <label for="add-email">Email: </label>
                    <input type="text" id="add-email" placeholder="New User's Email" required>

                    <input type="submit" value="Add">
                </form>
            </div>
            <div class="activity-section">
                <div id="activityFeed">
                    <h2>Activity Feed</h2>
                    <ul id="activityList"></ul>
                </div>
            </div>

        </aside>
    </main>
    <script src="js/signalr.min.js"></script>
    <script src="js/siteUsers.js" asp-append-version="true"></script>
    <script type="text/javascript">
        initSignalR();
        redirectIfNeeded();
    </script>
</body>

</html>
