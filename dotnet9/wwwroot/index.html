<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MUSIC - instruments</title>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body>
    <h1>MUSIC - instruments</h1>
    <h3>Add</h3>
    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
        <input type="text" id="add-name" placeholder="New Music">
        <input type="submit" value="Add">
    </form>

    <div id="editForm">
        <h3>Edit</h3>
        <form action="javascript:void(0);" onsubmit="updateItem()">
            <input type="hidden" id="edit-id">
            <input type="checkbox" id="edit-isAccompanying">
            <input type="text" id="edit-name">
            <input type="submit" value="Save">
            <a onclick="closeInput()" aria-label="Close">&#10006;</a>
        </form>
    </div>

    <p id="counter"></p>
  <div id="activityFeed">
        <h3>Activity Feed</h3>
        <ul id="activityList"></ul>
    </div>

    <table>
        <tr>
            <th>Is Accompanying?</th>
            <th>Name</th>
            <th></th>
            <th></th>
        </tr>
        <tbody id="musics"></tbody>
    </table>
    
     <div id="users-link"><!-- <a href="./users.html">my details</a> --> </div>

        <p>user details</p>
        
        <h5>name: <span id="contentName"></span></h5>
        <h5>password: <span  id="contentPwd"></span></h5>
        <button onclick="displayEditFormUser()">Edit</button>
    </div> -->
    <div class="user-card">
        <p class="title">User Details</p>

        <div class="row">
            <h5>name: <span id="contentName"></span></h5>
            <h5>password: <span id="contentPwd" class="pwd-mask"></span></h5>
            <button onclick="displayEditFormUser()">Edit</button>
        </div>
    </div>

      <div id="editForm2">
        <h3>Edit</h3>
        <form action="javascript:void(0);" onsubmit="updateUser()">
            <input type="hidden" id="edit2-id">
            <input type="text" id="edit2-name">
            <input type="text" id="edit2-passwd">
            <input type="submit" value="Save">
            <a onclick="closeInput2()" aria-label="Close">&#10006;</a>
        </form>
    </div>

    <script src="js/signalr.min.js"></script>
    <script src="js/site.js" asp-append-version="true"></script>
    <script type="text/javascript">
        initSignalR();
        redirectIfNeeded();
    </script>
</body>

</html>
